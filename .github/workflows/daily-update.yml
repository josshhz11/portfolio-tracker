name: Daily Update

on:
  schedule:
    - cron: "5 0 * * *"  # 00:05 UTC daily
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PORTFOLIO_USER_ID: ${{ secrets.PORTFOLIO_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Supabase secrets are present
        run: |
          test -n "$SUPABASE_DB_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$PORTFOLIO_USER_ID"
      - name: Show pipeline target
        run: echo "Daily run configured for Supabase-backed deployment."
      - name: Run daily update
        run: python -m src.main update-daily
